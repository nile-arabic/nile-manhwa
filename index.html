<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NILE — اقرأ المانهوا</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#000;--bg2:#0a0a0a;--bg3:#111;--green:#00ff88;--green2:#00cc66;--green3:rgba(0,255,136,0.1);--border:rgba(0,255,136,0.15);--border2:rgba(255,255,255,0.06);--text:#e8fff2;--sub:#8abf9a;--muted:#4a7a5a;--gold:#f0a500;--red:#ff4444;--sidebar:210px;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;}
nav{height:56px;background:#000;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:fixed;top:0;left:0;right:0;z-index:300;gap:12px;}
.logo{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--green);letter-spacing:3px;text-shadow:0 0 14px rgba(0,255,136,0.4);cursor:pointer;}
.ns{flex:1;max-width:320px;position:relative;}
.ns input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:7px 12px 7px 32px;color:var(--text);font-size:13px;outline:none;font-family:'Cairo',sans-serif;}
.ns input::placeholder{color:var(--muted);}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;}
.nr{display:flex;gap:8px;}
.nb{padding:6px 14px;border-radius:5px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;}
.nbo{background:transparent;border:1px solid var(--border);color:var(--green);}
.nbs{background:var(--green);border:none;color:#000;font-weight:700;}
.layout{display:flex;padding-top:56px;min-height:100vh;}
.sidebar{width:var(--sidebar);background:#000;border-left:1px solid var(--border);position:fixed;top:56px;right:0;bottom:0;overflow-y:auto;padding:10px 0;z-index:200;}
.sbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:2px;padding:8px 14px 4px;text-transform:uppercase;}
.sbi{display:flex;align-items:center;padding:8px 14px;font-size:13px;color:var(--sub);cursor:pointer;transition:all 0.15s;border-right:3px solid transparent;}
.sbi:hover{background:var(--green3);color:var(--green);}
.sbi.act{background:rgba(0,255,136,0.07);color:var(--green);border-right-color:var(--green);}
.sdiv{height:1px;background:var(--border2);margin:8px 12px;}
.main{margin-right:var(--sidebar);flex:1;padding:18px 20px;min-width:0;}
.hero{position:relative;border-radius:10px;overflow:hidden;margin-bottom:22px;height:300px;}
.hs{position:absolute;inset:0;opacity:0;transition:opacity 0.7s;display:flex;align-items:flex-end;}
.hs.on{opacity:1;}
.hbg{position:absolute;inset:0;background-size:cover;background-position:center;}
.hg{position:absolute;inset:0;background:linear-gradient(to left,transparent 0%,rgba(0,0,0,0.5) 40%,rgba(0,0,0,0.97) 65%);}
.hi{position:relative;z-index:2;padding:18px 22px;flex:1;}
.hbdg{display:inline-block;background:var(--green);color:#000;font-size:9px;font-weight:700;padding:3px 9px;border-radius:3px;margin-bottom:7px;}
.ht{font-size:17px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.3;font-family:'Cinzel',serif;}
.hm{display:flex;gap:10px;font-size:11px;color:var(--sub);margin-bottom:8px;}
.hr{color:var(--gold);}
.hd{font-size:12px;color:#9abfaa;line-height:1.5;max-width:440px;margin-bottom:12px;}
.hbtns{display:flex;gap:8px;}
.hbp{background:var(--green);color:#000;border:none;border-radius:5px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;}
.hd2{position:absolute;bottom:10px;right:50%;transform:translateX(50%);display:flex;gap:5px;z-index:3;}
.hdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:background 0.2s;}
.hdot.on{background:var(--green);}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.st{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.st::before{content:'';display:inline-block;width:3px;height:16px;background:var(--green);border-radius:2px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-bottom:24px;}
.card{cursor:pointer;transition:transform 0.2s;}
.card:hover{transform:translateY(-4px);}
.cov{aspect-ratio:3/4;border-radius:8px;overflow:hidden;position:relative;margin-bottom:8px;background:var(--bg3);}
.cov img{width:100%;height:100%;object-fit:cover;display:block;}
.crk{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.85);color:var(--green);font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;z-index:2;}
.cbdg{position:absolute;top:6px;left:6px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;z-index:2;}
.bnew{background:var(--green);color:#000;}
.bhot{background:var(--red);color:#fff;}
.ctit{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Cinzel',serif;}
.cch{font-size:10px;color:var(--green);}
.crat{font-size:10px;color:var(--gold);}

/* ========== LATEST CHAPTERS SECTION ========== */
.latest-sec{margin-bottom:28px;}
.latest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.latest-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;display:flex;gap:12px;padding:10px;cursor:pointer;transition:all 0.2s;}
.latest-card:hover{border-color:var(--border);background:var(--bg3);}
.latest-cover{width:54px;height:72px;border-radius:6px;overflow:hidden;flex-shrink:0;}
.latest-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.latest-info{flex:1;min-width:0;}
.latest-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Cinzel',serif;}
.latest-chs{display:flex;flex-direction:column;gap:3px;}
.latest-ch{display:flex;align-items:center;justify-content:space-between;font-size:11px;}
.latest-ch-num{color:var(--green);}
.latest-ch-time{color:var(--muted);font-size:10px;}
.latest-badge{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;background:var(--green);color:#000;font-weight:700;}

/* ========== MOST VIEWED SECTION ========== */
.top-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:24px;}
.top-card{cursor:pointer;position:relative;}
.top-card:hover .top-cov img{transform:scale(1.05);}
.top-cov{aspect-ratio:3/4;border-radius:8px;overflow:hidden;position:relative;margin-bottom:6px;background:var(--bg3);}
.top-cov img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
.top-rank{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);padding:6px 6px 4px;font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--green);}
.top-title{font-size:10px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-rat{font-size:10px;color:var(--gold);}

/* ========== DETAIL PAGE ========== */
.dh{display:flex;gap:20px;margin-bottom:22px;padding:20px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;}
.dc2{width:150px;flex-shrink:0;border-radius:8px;overflow:hidden;}
.dc2 img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
.di{flex:1;}
.dt{font-size:16px;font-weight:700;color:var(--green);margin-bottom:4px;font-family:'Cinzel',serif;}
.dar{font-size:13px;color:var(--sub);margin-bottom:8px;}
.dtgs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.dtag{font-size:10px;padding:3px 9px;border-radius:10px;border:1px solid var(--border);color:var(--sub);}
.dd{font-size:13px;color:var(--sub);line-height:1.7;margin-bottom:12px;}
.dbtns{display:flex;gap:8px;flex-wrap:wrap;}
.dbp{background:var(--green);color:#000;border:none;border-radius:5px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;}
.dbs2{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;}
.dbs3{background:transparent;color:var(--gold);border:1px solid rgba(240,165,0,0.3);border-radius:5px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;}

/* ========== STAR RATING ========== */
.star-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.stars{display:flex;gap:2px;}
.star{font-size:16px;color:#333;cursor:pointer;transition:color 0.15s;}
.star.on{color:var(--gold);}
.star-val{font-size:12px;color:var(--gold);font-weight:700;}
.star-count{font-size:11px;color:var(--muted);}

/* ========== META INFO SIDE ========== */
.det-wrap{display:flex;gap:16px;margin-bottom:22px;}
.det-main{flex:1;min-width:0;}
.det-side{width:160px;flex-shrink:0;}
.det-side-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.dsb-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border2);font-size:12px;}
.dsb-row:last-child{border-bottom:none;}
.dsb-label{color:var(--muted);}
.dsb-val{color:var(--text);font-weight:600;}

/* ========== READ PAGE ========== */
.rbar{background:#000;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:56px;z-index:100;}
.ri{flex:1;}
.rt2{font-size:12px;font-weight:700;color:var(--text);font-family:'Cinzel',serif;}
.rc2{font-size:11px;color:var(--muted);}
.rctl{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.rbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 11px;border-radius:4px;font-size:11px;cursor:pointer;font-family:'Cairo',sans-serif;}
.rbtn:hover{background:var(--green3);}
.rsel{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:4px;font-size:11px;cursor:pointer;outline:none;font-family:'Cairo',sans-serif;}
.rpgs{max-width:800px;margin:0 auto;padding:16px 12px;}
.pnum{text-align:center;font-size:10px;color:var(--muted);padding:2px 0 6px;}

/* ========== EMOJI REACTIONS ========== */
.reactions-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin:16px 0;text-align:center;}
.reactions-title{font-size:12px;color:var(--sub);margin-bottom:12px;}
.reactions-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.react-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--bg3);border:2px solid var(--border2);border-radius:10px;padding:10px 14px;cursor:pointer;transition:all 0.2s;min-width:56px;}
.react-btn:hover{background:var(--green3);border-color:var(--border);transform:scale(1.08);}
.react-btn.active{border-color:var(--green);background:rgba(0,255,136,0.08);}
.react-emoji{font-size:22px;line-height:1;}
.react-count{font-size:11px;font-weight:700;color:var(--text);}

/* ========== PAGES ========== */
.page{display:none;}
.page.on{display:block;}
.aw{display:none;align-items:center;justify-content:center;min-height:calc(100vh - 56px);padding:28px 16px;}
.aw.on{display:flex;}
.cl{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;overflow:hidden;}
.clh{padding:11px 15px;border-bottom:1px solid var(--border2);}
.clht{font-size:12px;font-weight:700;color:var(--text);font-family:'Cinzel',serif;}
.ce{display:flex;align-items:center;justify-content:space-between;padding:9px 15px;border-bottom:1px solid rgba(255,255,255,0.025);cursor:pointer;transition:background 0.15s;}
.ce:last-child{border-bottom:none;}
.ce:hover{background:var(--green3);}
.cen{font-size:12px;color:var(--green);}
.ced{font-size:10px;color:var(--muted);}
.upsec{background:var(--bg2);border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;margin-top:16px;}
.upsec h3{font-size:14px;color:var(--green);margin-bottom:8px;}
.upsec p{font-size:12px;color:var(--muted);margin-bottom:14px;}
.upbtn{background:var(--green);color:#000;border:none;border-radius:5px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(0,255,136,0.2);border-radius:2px;}
@media(max-width:600px){.sidebar{display:none;}.main{margin-right:0;}.grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}.dh{flex-direction:column;}.det-wrap{flex-direction:column;}.det-side{width:100%;}}

/* ========== FLOATING ADMIN ========== */
.fab{position:fixed;bottom:24px;left:24px;z-index:9999;width:52px;height:52px;border-radius:50%;background:var(--green);color:#000;font-size:22px;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(0,255,136,0.4);transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(0,255,136,0.6);}
.adm-panel{position:fixed;bottom:88px;left:24px;z-index:9998;width:320px;background:#0d0d0d;border:1px solid var(--border);border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.8);display:none;overflow:hidden;}
.adm-panel.open{display:block;}
.adm-header{background:var(--green);color:#000;padding:12px 16px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;display:flex;justify-content:space-between;align-items:center;}
.adm-close{background:none;border:none;color:#000;font-size:18px;cursor:pointer;line-height:1;}
.adm-body{padding:16px;}
.adm-field{margin-bottom:12px;}
.adm-label{font-size:11px;color:var(--sub);display:block;margin-bottom:5px;}
.adm-select,.adm-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 12px;color:var(--text);font-size:12px;outline:none;font-family:'Cairo',sans-serif;}
.adm-select:focus,.adm-input:focus{border-color:var(--green);}
.adm-row{display:flex;gap:8px;}
.adm-row .adm-field{flex:1;}
.adm-submit{width:100%;background:var(--green);color:#000;border:none;border-radius:6px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:4px;}
.adm-submit:hover{background:var(--green2);}
.adm-ok{display:none;background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);border-radius:8px;padding:10px;margin-top:10px;font-size:12px;color:var(--green);text-align:center;}
.adm-filebtn{width:100%;background:transparent;color:var(--green);border:1px dashed var(--green);border-radius:6px;padding:8px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif;transition:all 0.2s;}
.adm-filebtn:hover{background:var(--green3);}
.adm-filelist{font-size:11px;color:var(--muted);margin-top:6px;max-height:60px;overflow-y:auto;}
.adm-tabs{display:flex;border-bottom:1px solid var(--border2);margin-bottom:14px;}
.adm-tab{flex:1;padding:8px;font-size:11px;font-weight:700;cursor:pointer;text-align:center;color:var(--muted);border-bottom:2px solid transparent;font-family:'Cairo',sans-serif;}
.adm-tab.on{color:var(--green);border-bottom-color:var(--green);}
.adm-pane{display:none;}
.adm-pane.on{display:block;}

/* ========== COMMENTS ========== */
.cmtsec{margin-top:20px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:18px;}
.cmtsec h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.cmtsec h3::before{content:'';display:inline-block;width:3px;height:14px;background:var(--green);border-radius:2px;}
.cmtbox{display:flex;gap:10px;margin-bottom:16px;}
.cmtinp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:9px 12px;color:var(--text);font-size:12px;font-family:'Cairo',sans-serif;resize:none;height:70px;outline:none;}
.cmtinp:focus{border-color:var(--green);}
.cmtinp::placeholder{color:var(--muted);}
.cmtbtn{background:var(--green);color:#000;border:none;border-radius:6px;padding:0 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;align-self:flex-end;height:36px;}
.cmtlist{display:flex;flex-direction:column;gap:10px;}
.cmt{background:var(--bg3);border-radius:8px;padding:10px 14px;border:1px solid var(--border2);}
.cmtname{font-size:11px;font-weight:700;color:var(--green);margin-bottom:4px;}
.cmttxt{font-size:12px;color:var(--sub);line-height:1.6;}
.nocmt{text-align:center;color:var(--muted);font-size:12px;padding:16px 0;}
.cmt-reply{margin-right:20px;border-right:2px solid var(--border);}
.cmt-reply-badge{font-size:10px;color:var(--green);margin-bottom:4px;opacity:0.8;}
.cmt-actions{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;}
.cmt-time{font-size:10px;color:var(--muted);flex:1;}
.cmt-like,.cmt-dislike,.cmt-reply-btn{background:transparent;border:1px solid var(--border2);color:var(--sub);font-size:11px;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:'Cairo',sans-serif;}
.cmt-like:hover,.cmt-dislike:hover{background:var(--green3);}
.cmt-like.active{color:var(--green);border-color:var(--green);}
.cmt-dislike.active-dis{color:var(--red);border-color:var(--red);}
.cmt-reply-btn{color:var(--muted);}
.cmt-reply-btn:hover{color:var(--green);}
</style>
</head>
<body>
<nav>
  <div class="logo" onclick="gP('home')">NILE</div>
  <div class="ns"><span class="si">&#9906;</span><input type="text" placeholder="ابحث عن مانهوا..." oninput="doSearch(this.value)"/></div>
  <div class="nr">
    <button class="nb nbo" onclick="gP('login')">دخول</button>
    <button class="nb nbs" onclick="gP('register')">تسجيل</button>
  </div>
</nav>
<div class="layout">
  <aside class="sidebar">
    <div class="sbl">القائمة</div>
    <div class="sbi act" onclick="gP('home');sB(this)">الرئيسية</div>
    <div class="sbi" onclick="srt();sB(this)">الأعلى تقييماً</div>
    <div class="sbi" onclick="gP('home');sB(this)">الأحدث</div>
    <div class="sdiv"></div>
    <div class="sbl">الأنواع</div>
    <div class="sbi" onclick="fBy('أكشن');sB(this)">أكشن</div>
    <div class="sbi" onclick="fBy('فانتازيا');sB(this)">فانتازيا</div>
    <div class="sbi" onclick="fBy('كوميديا');sB(this)">كوميديا</div>
    <div class="sbi" onclick="fBy('إثارة');sB(this)">إثارة</div>
    <div class="sbi" onclick="fBy('فنون قتالية');sB(this)">فنون قتالية</div>
  </aside>
  <main class="main">
    <!-- HOME PAGE -->
    <div id="pg-home" class="page on">
      <div class="hero" id="hero-box"></div>

      <!-- MOST VIEWED -->
      <div class="sh"><div class="st">🔥 الأكثر مشاهدة</div></div>
      <div class="top-grid" id="top-grid"></div>

      <!-- LATEST CHAPTERS -->
      <div class="sh"><div class="st">🕐 آخر الفصول</div></div>
      <div class="latest-grid" id="latest-grid"></div>

      <!-- FULL LIBRARY -->
      <div class="sh"><div class="st">المكتبة &mdash; 10 منهوا</div></div>
      <div class="grid" id="mg"></div>
    </div>

    <!-- LIBRARY PAGE -->
    <div id="pg-lib" class="page"><div class="sh"><div class="st" id="lt">المكتبة</div></div><div class="grid" id="lg"></div></div>

    <!-- DETAIL PAGE -->
    <div id="pg-det" class="page"><div id="dc"></div></div>

    <!-- READ PAGE -->
    <div id="pg-read" class="page">
      <div class="rbar">
        <div class="ri"><div class="rt2" id="rtx">-</div><div class="rc2" id="rcx">-</div></div>
        <div class="rctl">
          <button class="rbtn" id="rpx">&#9664; السابق</button>
          <select class="rsel" id="rsx" onchange="jC(+this.value)"></select>
          <button class="rbtn" id="rnx">التالي &#9654;</button>
          <button class="rbtn" onclick="gP('det')">الفصول</button>
          <button class="rbtn" onclick="gP('home')">إغلاق</button>
        </div>
      </div>
      <div class="rpgs" id="rp2"></div>
    </div>

<script>
function toggleAdm(){var p=document.getElementById('adm-panel');p.classList.toggle('open');}
function admTab(t){
  document.querySelectorAll('.adm-tab').forEach(function(el,i){el.classList.toggle('on',i===(t==='url'?0:1));});
  document.getElementById('adm-pane-url').classList.toggle('on',t==='url');
  document.getElementById('adm-pane-file').classList.toggle('on',t==='file');
}
function padNum(n,len){var s=String(n);while(s.length<len)s='0'+s;return s;}
var MANGA_CFG={3:{prefix:'Cri',pad:2},10:{prefix:'Vil',pad:4},7:{prefix:'back',pad:3},1:{prefix:'Star',pad:4}};

function admAddUrl(){
  var sel=document.getElementById('adm-manga').value.split('|');
  var mid=parseInt(sel[0]),prefix=sel[1],pad=parseInt(sel[2]);
  var ch=parseInt(document.getElementById('adm-ch').value);
  var cnt=parseInt(document.getElementById('adm-cnt').value);
  if(isNaN(ch)||isNaN(cnt)||cnt<1){alert('يرجى إدخال رقم الفصل وعدد الصور!');return;}
  var m=DB.find(function(x){return x.id===mid;});if(!m)return;
  var base='https://raw.githubusercontent.com/anasmohamedsalam9-lab/nile-manhwa/main/';
  var pages=[];
  for(var i=1;i<=cnt;i++) pages.push(base+ch+prefix+padNum(i,pad)+'.webp');
  m.pages[ch]=pages;
  if(!m.chs.find(function(c){return c.n===ch;})) m.chs.unshift({n:ch,t:'الآن'});
  admSuccess('✅ تم إضافة '+cnt+' صورة للفصل '+ch+' — '+m.ar);
  document.getElementById('adm-ch').value='';
  document.getElementById('adm-cnt').value='';
}

var admLoadedFiles=[];
function admFileChange(){
  var files=Array.from(document.getElementById('adm-files').files);
  admLoadedFiles=files.sort(function(a,b){return a.name.localeCompare(b.name);});
  var fl=document.getElementById('adm-filelist');
  if(!files.length){fl.textContent='لم يتم اختيار صور بعد';return;}
  fl.innerHTML=files.length+' صورة: '+files.slice(0,3).map(function(f){return f.name;}).join(', ')+(files.length>3?'...':'');
}

function admAddFiles(){
  var mid=parseInt(document.getElementById('adm-manga2').value);
  var ch=parseInt(document.getElementById('adm-ch2').value);
  if(isNaN(ch)){alert('يرجى إدخال رقم الفصل!');return;}
  if(!admLoadedFiles.length){alert('يرجى اختيار الصور!');return;}
  var m=DB.find(function(x){return x.id===mid;});if(!m)return;
  var btn=document.querySelector('#adm-pane-file .adm-submit');
  btn.textContent='⏳ جاري الرفع...';btn.disabled=true;
  Promise.all(admLoadedFiles.map(function(f){
    return new Promise(function(res){
      var fr=new FileReader();
      fr.onload=function(e){res(e.target.result);};
      fr.readAsDataURL(f);
    });
  })).then(function(imgs){
    m.pages[ch]=imgs;
    if(!m.chs.find(function(c){return c.n===ch;})) m.chs.unshift({n:ch,t:'الآن'});
    admSuccess('✅ تم رفع '+imgs.length+' صورة للفصل '+ch+' — '+m.ar);
    btn.textContent='✅ رفع وإضافة الفصل';btn.disabled=false;
    admLoadedFiles=[];
    document.getElementById('adm-files').value='';
    document.getElementById('adm-filelist').textContent='لم يتم اختيار صور بعد';
    document.getElementById('adm-ch2').value='';
  });
}

function admSuccess(msg){
  var ok=document.getElementById('adm-ok');
  ok.textContent=msg;ok.style.display='block';
  setTimeout(function(){ok.style.display='none';},4000);
}
</script>

/* ====== LATEST CHAPTERS ====== */
function bLatest(){
  var sorted=DB.slice().sort(function(a,b){
    var ta=a.chs[0]?a.chs[0].t:'';
    var tb=b.chs[0]?b.chs[0].t:'';
    if(ta.indexOf('ساعة')>=0||ta.indexOf('ساعتين')>=0) return -1;
    if(tb.indexOf('ساعة')>=0||tb.indexOf('ساعتين')>=0) return 1;
    if(ta.indexOf('يوم')>=0) return -1;
    if(tb.indexOf('يوم')>=0) return 1;
    return 0;
  });
  document.getElementById('latest-grid').innerHTML=sorted.map(function(m){
    var topChs=m.chs.slice(0,3);
    return '<div class="latest-card" onclick="oD('+m.id+')">'+
      '<div class="latest-cover"><img src="'+m.cover+'" alt="'+m.title+'" onerror="this.style.display=\'none\'"/></div>'+
      '<div class="latest-info">'+
        '<div class="latest-title">'+m.ar+'</div>'+
        '<div class="latest-chs">'+topChs.map(function(c){
          var isNew=c.t.indexOf('ساعة')>=0||c.t.indexOf('ساعتين')>=0||c.t.indexOf('يوم')>=0;
          return '<div class="latest-ch">'+
            '<span class="latest-ch-num">'+
              (isNew?'<span class="latest-badge">NEW</span>':'')+
              'فصل '+c.n+
            '</span>'+
            '<span class="latest-ch-time">'+c.t+'</span>'+
          '</div>';
        }).join('')+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

/* ====== STAR RATING ====== */
function getAvgRating(m){
  if(!m.ratings||!m.ratings.length) return parseFloat(m.rat);
  var sum=m.ratings.reduce(function(a,b){return a+b;},0);
  return (sum/m.ratings.length).toFixed(1);
}
function buildStars(mid,val,interactive){
  val=parseFloat(val)||0;
  var full=Math.floor(val);
  var html='<div class="stars" id="stars-'+mid+'">';
  for(var i=1;i<=5;i++){
    var cls=i<=full?'star on':'star';
    html+='<span class="'+cls+'" ';
    if(interactive) html+='onclick="rateManga('+mid+','+i+')" onmouseover="hoverStars('+mid+','+i+')" onmouseout="resetStars('+mid+')"';
    html+='>&#9733;</span>';
  }
  html+='</div>';
  return html;
}
function rateManga(mid,val){
  if(!cU){alert('يجب تسجيل الدخول للتقييم');gP('login');return;}
  var m=DB.find(function(x){return x.id===mid;});
  if(!m)return;
  userRatings[mid]=val;
  m.ratings.push(val);
  var avg=getAvgRating(m);
  var cont=document.getElementById('star-container-'+mid);
  if(cont) cont.innerHTML=buildStars(mid,avg,true)+'<span class="star-val">'+avg+'</span><span class="star-count">('+m.ratings.length+' تقييم)</span>';
}
function hoverStars(mid,val){
  var stars=document.querySelectorAll('#stars-'+mid+' .star');
  stars.forEach(function(s,i){s.classList.toggle('on',i<val);});
}
function resetStars(mid){
  var m=DB.find(function(x){return x.id===mid;});
  if(!m)return;
  var avg=getAvgRating(m);
  var full=Math.floor(avg);
  var stars=document.querySelectorAll('#stars-'+mid+' .star');
  stars.forEach(function(s,i){s.classList.toggle('on',i<full);});
}

/* ====== REACTIONS ====== */
var REACT_LIST=[
  {k:'fire',e:'🔥',l:'رهيب'},
  {k:'love',e:'❤️',l:'أحببته'},
  {k:'wow',e:'😮',l:'مذهل'},
  {k:'laugh',e:'😂',l:'مضحك'},
  {k:'sad',e:'😢',l:'حزين'},
  {k:'angry',e:'😡',l:'غاضب'}
];
function buildReactions(mid,reactions){
  var html='<div class="reactions-box">'+
    '<div class="reactions-title">&#128172; تفاعل مع هذا الفصل</div>'+
    '<div class="reactions-row" id="react-row-'+mid+'">';
  REACT_LIST.forEach(function(r){
    var cnt=(reactions&&reactions[r.k])||0;
    var isActive=userReactions[mid]===r.k;
    html+='<button class="react-btn'+(isActive?' active':'')+'" onclick="doReact(\''+mid+'\',\''+r.k+'\')">'+
      '<span class="react-emoji">'+r.e+'</span>'+
      '<span class="react-count" id="rc-'+mid+'-'+r.k+'">'+cnt+'</span>'+
    '</button>';
  });
  html+='</div></div>';
  return html;
}
function doReact(mid,key){
  var m=DB.find(function(x){return String(x.id)===String(mid)||'ch_'+x.id+'_'+x.chs[0]===mid;});
  var prev=userReactions[mid];
  if(prev===key){
    // toggle off — for simplicity just keep it
    return;
  }
  // remove old
  if(prev){
    var oldEl=document.getElementById('rc-'+mid+'-'+prev);
    if(oldEl){
      var oldVal=parseInt(oldEl.textContent)||0;
      if(oldVal>0){oldEl.textContent=oldVal-1;}
    }
    var oldBtn=oldEl&&oldEl.closest('.react-btn');
    if(oldBtn) oldBtn.classList.remove('active');
  }
  userReactions[mid]=key;
  var el=document.getElementById('rc-'+mid+'-'+key);
  if(el){el.textContent=(parseInt(el.textContent)||0)+1;}
  var btn=el&&el.closest('.react-btn');
  if(btn){
    btn.classList.add('active');
    btn.style.transform='scale(1.2)';
    setTimeout(function(){btn.style.transform='';},200);
  }
  document.querySelectorAll('#react-row-'+mid+' .react-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
}

function hUp(mid,inp){
  var m=DB.find(function(x){return x.id===mid;});if(!m)return;
  var files=Array.from(inp.files);if(!files.length)return;
  var ch=prompt('رقم الفصل؟',m.chs[0].n);if(!ch)return;
  var n=parseInt(ch);
  var sorted=files.sort(function(a,b){return a.name.localeCompare(b.name);});
  Promise.all(sorted.map(function(f){return new Promise(function(r){var fr=new FileReader();fr.onload=function(e){r(e.target.result);};fr.readAsDataURL(f);});})).then(function(imgs){m.pages[n]=imgs;if(!m.chs.find(function(c){return c.n===n;}))m.chs.unshift({n:n,t:'الآن'});alert('تم رفع '+imgs.length+' صورة للفصل '+n+'!');oD(mid);});
}

/* ====== READ PAGE ====== */
function sR(id,ch){
  cM=DB.find(function(m){return m.id===id;});if(!cM)return;
  cC=ch;document.getElementById('rtx').textContent=cM.title;
  var sel=document.getElementById('rsx');sel.innerHTML='';
  cM.chs.forEach(function(c){var op=document.createElement('option');op.value=c.n;op.textContent='الفصل '+c.n;if(c.n===ch)op.selected=true;sel.appendChild(op);});
  document.getElementById('rpx').onclick=function(){var i=cM.chs.findIndex(function(c){return c.n===cC;});if(i<cM.chs.length-1){cC=cM.chs[i+1].n;lP();}};
  document.getElementById('rnx').onclick=function(){var i=cM.chs.findIndex(function(c){return c.n===cC;});if(i>0){cC=cM.chs[i-1].n;lP();}};
  lP();gP('read');
}
function jC(n){cC=n;lP();}
function lP(){

      '<div><input type="file" id="uf'+cC+'" multiple accept="image/*" style="display:none" onchange="hUp('+m.id+',this)"/>'+

  }

      '<div class="cmtbox" id="cmt-box-'+chId+'">'+

      '<div class="cmtlist" id="cmt-list-'+chId+'"><div class="nocmt">جاري التحميل...</div></div>'+
    '</div>';

  window.scrollTo(0,0);
  setTimeout(function(){if(window.loadCmts)loadCmts(chId);},500);
}

/* ====== NAVIGATION ====== */
function gP(p){
  ['home','lib','det','read'].forEach(function(id){
    var el=document.getElementById('pg-'+id);
    if(el){el.classList.toggle('on',id===p);el.style.display=id===p?'block':'none';}
  });
  ['login','register'].forEach(function(id){
    var el=document.getElementById('pg-'+id);
    if(el){el.classList.toggle('on',id===p);el.style.display=id===p?'flex':'none';}
  });
}
function sB(el){document.querySelectorAll('.sbi').forEach(function(i){i.classList.remove('act');});el.classList.add('act');}
function fBy(g){var l=DB.filter(function(m){return m.genre.indexOf(g)>=0;});document.getElementById('lt').textContent=g+' - '+l.length+' منهوا';bG(l,'lg');gP('lib');}

function doSearch(q){if(!q.trim())return;var r=DB.filter(function(m){return m.title.toLowerCase().indexOf(q.toLowerCase())>=0||m.ar.indexOf(q)>=0;});document.getElementById('lt').textContent='نتائج البحث - '+r.length;bG(r.length?r:DB,'lg');gP('lib');}

function dLogin(){var em=document.getElementById('lem').value.trim(),pw=document.getElementById('lpw').value,err=document.getElementById('le');err.style.display='none';if(!em||!pw){err.textContent='يرجى ملء جميع الحقول';err.style.display='block';return;}var u=us[em];if(!u||u.pw!==pw){err.textContent='بيانات غير صحيحة';err.style.display='block';return;}cU={email:em,name:u.name};document.querySelector('.nbo').textContent=u.name;gP('home');}
function dReg(){var n=document.getElementById('rnm').value.trim(),em=document.getElementById('rem').value.trim(),pw=document.getElementById('rpw').value,err=document.getElementById('re'),ok=document.getElementById('rok');err.style.display='none';ok.style.display='none';if(!n||!em||!pw){err.textContent='يرجى ملء جميع الحقول';err.style.display='block';return;}if(pw.length<6){err.textContent='كلمة المرور 6 أحرف على الأقل';err.style.display='block';return;}us[em]={name:n,pw:pw};ok.style.display='block';setTimeout(function(){gP('login');},1200);}

<script>
window.addEventListener('load', function() {
  var s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
  s1.onload = function() {
    var s2 = document.createElement('script');

    s2.onload = function() {
      try {
        firebase.initializeApp({
          apiKey:"AIzaSyAGWlEfAvUUtqDcR3G7IvWuymXurPCHorU",
          authDomain:"nile-manhwa.firebaseapp.com",
          projectId:"nile-manhwa",
          storageBucket:"nile-manhwa.firebasestorage.app",
          messagingSenderId:"602094634172",
          appId:"1:602094634172:web:e9490d2b0f988260fb7cb9"
        });
        window.db = firebase.firestore();
        window._dbReady = true;
      } catch(e){ window._dbReady=false; }
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
});

window.addCmt = function(mid, replyTo, replyName) {
  if(!cU){alert('يجب تسجيل الدخول أولاً للتعليق');gP('login');return;}
  var inp=document.getElementById('cmt-inp-'+mid);
  var txt=inp?inp.value.trim():'';
  if(!txt)return;
  var btn=document.querySelector('#cmt-box-'+mid+' .cmtbtn');
  if(!window._dbReady||!window.db){alert('التعليقات تعمل فقط على الموقع المنشور');return;}
  if(btn){btn.disabled=true;btn.textContent='...';}
  var data={name:cU.name,txt:txt,time:new Date().toISOString(),likes:[],dislikes:[]};
  if(replyTo){data.replyTo=replyTo;data.replyName=replyName;}
  window.db.collection('cmts_'+mid).add(data)
  .then(function(){
    if(inp)inp.value='';
    if(btn){btn.disabled=false;btn.textContent='إرسال';}
    var ri=document.getElementById('reply-ind-'+mid);
    if(ri)ri.remove();
  })
  .catch(function(){if(btn){btn.disabled=false;btn.textContent='إرسال';}});
};

window.loadCmts = function(mid) {
  var el=document.getElementById('cmt-list-'+mid);
  if(!el)return;
  if(!window._dbReady||!window.db){el.innerHTML='<div class="nocmt">كن أول من يعلق! 💬</div>';return;}
  window.db.collection('cmts_'+mid).orderBy('time','asc').onSnapshot(function(snap){
    if(!el)return;
    if(snap.empty){el.innerHTML='<div class="nocmt">كن أول من يعلق! 💬</div>';return;}
    el.innerHTML=snap.docs.map(function(d){
      var c=d.data();var id=d.id;
      var t=new Date(c.time);
      var ts=t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');
      var likes=c.likes?c.likes.length:0;
      var dislikes=c.dislikes?c.dislikes.length:0;
      var uname=cU?cU.name:'';
      var liked=c.likes&&c.likes.indexOf(uname)>=0;
      var disliked=c.dislikes&&c.dislikes.indexOf(uname)>=0;
      var replyBadge=c.replyTo?'<div class="cmt-reply-badge">↩ رداً على '+c.replyName+'</div>':'';
      return '<div class="cmt'+(c.replyTo?' cmt-reply':'')+'">'+
        replyBadge+
        '<div class="cmtname">'+c.name+'</div>'+
        '<div class="cmttxt">'+c.txt+'</div>'+
        '<div class="cmt-actions">'+
          '<span class="cmt-time">'+ts+'</span>'+
          '<button class="cmt-like'+(liked?' active':'')+'" onclick="voteCmt(\''+mid+'\',\''+id+'\',\'like\')">👍 '+likes+'</button>'+
          '<button class="cmt-dislike'+(disliked?' active-dis':'')+'" onclick="voteCmt(\''+mid+'\',\''+id+'\',\'dislike\')">👎 '+dislikes+'</button>'+
          '<button class="cmt-reply-btn" onclick="setReply(\''+mid+'\',\''+id+'\',\''+c.name+'\')">↩ رد</button>'+
        '</div>'+
      '</div>';
    }).join('');
  });
};

window.voteCmt = function(mid, docId, type) {
  if(!cU){alert('يجب تسجيل الدخول أولاً');gP('login');return;}
  if(!window._dbReady)return;
  var ref=window.db.collection('cmts_'+mid).doc(docId);
  ref.get().then(function(d){
    if(!d.exists)return;
    var data=d.data();
    var likes=data.likes||[];var dislikes=data.dislikes||[];var uname=cU.name;
    if(type==='like'){var li=likes.indexOf(uname);var di=dislikes.indexOf(uname);if(li>=0)likes.splice(li,1);else{likes.push(uname);if(di>=0)dislikes.splice(di,1);}
    }else{var di=dislikes.indexOf(uname);var li=likes.indexOf(uname);if(di>=0)dislikes.splice(di,1);else{dislikes.push(uname);if(li>=0)likes.splice(li,1);}}
    ref.update({likes:likes,dislikes:dislikes});
  });
};

window.setReply = function(mid, docId, name) {
  if(!cU){alert('يجب تسجيل الدخول أولاً');gP('login');return;}
  var box=document.querySelector('#cmt-box-'+mid);if(!box)return;
  var old=document.getElementById('reply-ind-'+mid);if(old)old.remove();
  var ri=document.createElement('div');ri.id='reply-ind-'+mid;
  ri.style.cssText='font-size:11px;color:var(--green);padding:4px 8px;background:rgba(0,255,136,0.1);border-radius:4px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;';
  ri.innerHTML='↩ رداً على <strong>'+name+'</strong> <span style="cursor:pointer;color:var(--muted);" onclick="cancelReply(\''+mid+'\')">✕</span>';
  box.insertBefore(ri,box.firstChild);
  box.dataset.replyTo=docId;box.dataset.replyName=name;
  document.getElementById('cmt-inp-'+mid).focus();
};

window.cancelReply = function(mid) {
  var ri=document.getElementById('reply-ind-'+mid);if(ri)ri.remove();
  var box=document.querySelector('#cmt-box-'+mid);
  if(box){delete box.dataset.replyTo;delete box.dataset.replyName;}
};

var _orig=window.addCmt;
window.addCmt=function(mid){
  var box=document.querySelector('#cmt-box-'+mid);
  var rT=box&&box.dataset.replyTo?box.dataset.replyTo:null;
  var rN=box&&box.dataset.replyName?box.dataset.replyName:null;
  _orig(mid,rT,rN);
  if(box){delete box.dataset.replyTo;delete box.dataset.replyName;}
};
</script>
